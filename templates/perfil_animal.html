{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Animal {{animal.identificacion}}</h2>

<p>Raza: {{animal.raza}}</p>
<p>Nacimiento: {{animal.fecha_nacimiento}}</p>
<p>Sexo: {{animal.sexo}}</p>

</div>


<div class="card">

<h3>Registrar Peso</h3>

<form method="POST" action="/registrar_peso/{{animal.id}}">

<input type="number" step="0.1" name="peso" placeholder="Peso (kg)" required>

<input type="date" name="fecha" required>

<button>Guardar peso</button>

</form>

</div>


<div class="card">

<h3>Historial de Pesos</h3>

<table>

<tr>
<th>Fecha</th>
<th>Peso</th>
</tr>

{% for p in pesos %}

<tr>

<td>{{p.fecha}}</td>
<td>{{p.peso}} kg</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
